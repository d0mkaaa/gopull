version: 2

builds:
  - binary: gopull
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch
  groups:
    - title: Features
      regexp: "^feat"
      order: 0
    - title: Bug fixes
      regexp: "^fix"
      order: 1
    - title: Other
      order: 999

# homebrew_casks replaces the deprecated brews section (deprecated since v2.10).
# Binaries are distributed as pre-built archives; GoReleaser generates the cask .rb
# and pushes it to d0mkaaa/homebrew-tap automatically on each tagged release.
homebrew_casks:
  - name: gopull
    homepage: "https://github.com/d0mkaaa/gopull"
    description: "A terminal HTTP client. Send requests, manage collections, inspect responses."
    license: MIT
    directory: Casks
    binaries:
      - gopull
    repository:
      owner: d0mkaaa
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "chore: update gopull cask to {{ .Tag }}"
    caveats: |
      gopull is not signed with an Apple Developer ID.
      If macOS blocks the binary on first run, remove the quarantine flag:
        xattr -d com.apple.quarantine "$(which gopull)"

# GoReleaser generates gopull.json and pushes it to d0mkaaa/scoop-gopull root.
# Manifests must be at the repo root for `scoop bucket list` to count them.
scoops:
  - name: gopull
    homepage: "https://github.com/d0mkaaa/gopull"
    description: "A terminal HTTP client. Send requests, manage collections, inspect responses."
    license: MIT
    repository:
      owner: d0mkaaa
      name: scoop-gopull
      token: "{{ .Env.SCOOP_GITHUB_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "chore: update gopull manifest to {{ .Tag }}"

release:
  github:
    owner: d0mkaaa
    name: gopull
  draft: false
  prerelease: auto
